# Values для chart prometheus-community/kube-prometheus-stack
# helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
# helm upgrade --install monitoring prometheus-community/kube-prometheus-stack -n monitoring --create-namespace -f helm/kube-prometheus-values.yaml
#
# Observability — отдельная плоскость: Prometheus собирает метрики опросом подов
# (cAdvisor/kubelet), Grafana визуализирует. Из коробки есть дашборды по подам
# (CPU/RAM), что покрывает минимум ДоД — метрики подов Ollama под нагрузкой.

grafana:
  # adminPassword вынесен в helm/secrets.local.yaml (gitignored), передаётся вторым -f.
  # Шаблон — в helm/secrets.example.yaml. Логин admin / пароль оттуда.
  # Наружу НЕ торчим своим LoadBalancer'ом — ходим через общий ingress-nginx (один LB на кластер).
  service:
    type: ClusterIP
    port: 80
  # Ingress: публикует Grafana на grafana.raft.rootcrops.tech через ingress-nginx, TLS — cert-manager.
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - grafana.raft.rootcrops.tech
    path: /
    tls:
      # cert-manager создаст и наполнит этот секрет по annotation cluster-issuer выше.
      - secretName: grafana-raft-tls
        hosts:
          - grafana.raft.rootcrops.tech
  # Grafana за ingress по своему домену — чтобы редиректы/ссылки строились правильно.
  grafana.ini:
    server:
      domain: grafana.raft.rootcrops.tech
      root_url: https://grafana.raft.rootcrops.tech
  # Дашборды/настройки переживают рестарт.
  persistence:
    enabled: true
    size: 2Gi
    storageClassName: "nvme.network-drives.csi.timeweb.cloud"   # TimeWeb: default-класса нет

prometheus:
  prometheusSpec:
    # Скромное хранилище метрик под маленький узел.
    retention: 7d
    # История метрик переживает рестарт пода.
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: "nvme.network-drives.csi.timeweb.cloud"  # TimeWeb: default-класса нет
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
    # Подхватывать ServiceMonitor/PodMonitor во всех namespace
    # (на случай, если позже включим /metrics у LiteLLM как бонус).
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

# Alertmanager на тестовом стенде не нужен — экономим ресурсы узла.
alertmanager:
  enabled: false
