# Values для официального chart litellm-helm (BerriAI)
# helm upgrade --install litellm oci://ghcr.io/berriai/litellm-helm -n llm-stand -f helm/litellm-values.yaml
#
# LiteLLM — прокси/роутер: принимает OpenAI-формат от OpenWebUI/k6,
# переводит в формат Ollama и проксирует на http://ollama:11434.
# Объявленный здесь model_list — это ровно то, что OpenWebUI покажет в выпадашке
# (он берёт его из GET /v1/models у LiteLLM).

# ВАЖНО: берём НЕ -database образ, чтобы не тянуть Prisma/Postgres.
image:
  repository: ghcr.io/berriai/litellm
  tag: main-stable
  pullPolicy: IfNotPresent

# ВАЖНО: по умолчанию chart поднимает standalone Postgres (Bitnami) — стенду БД не нужна.
# Отключаем оба варианта, тогда DATABASE_URL не выставляется и proxy работает на одном config.yaml.
db:
  deployStandalone: false
  useExisting: false

# master key вынесен в helm/secrets.local.yaml (gitignored), передаётся вторым -f.
# Шаблон значения — в helm/secrets.example.yaml. Это тот же ключ, что в openwebui
# (openaiApiKeys) и k6 (API_KEY). Без secrets.local.yaml релиз поднимется без masterkey.

# Содержимое рендерится chart-ом в config.yaml прокси.
proxy_config:
  model_list:
    # model_name — то, что видит пользователь в UI и шлёт k6.
    # litellm_params.model — реальный бэкенд: префикс ollama_chat/ = корректный
    # chat-эндпоинт Ollama для /v1/chat/completions.
    - model_name: qwen2.5:0.5b
      litellm_params:
        model: ollama_chat/qwen2.5:0.5b
        api_base: http://ollama:11434
    - model_name: llama3.2:1b
      litellm_params:
        model: ollama_chat/llama3.2:1b
        api_base: http://ollama:11434
  litellm_settings:
    # Метрики LiteLLM — бонус (не критичный путь). Включаем callback;
    # если версия не поддержит — базовые метрики всё равно закрыты cAdvisor'ом.
    drop_params: true
    # Пытаемся поднять Prometheus-эндпоинт /metrics прокси (запросы/латентность/токены
    # по моделям). В свежих OSS-сборках LiteLLM это enterprise-фича — если /metrics не
    # появится, откатываем этот callback (service-метрики берём с ingress-nginx).
    callbacks: ["prometheus"]
  general_settings:
    # /metrics в формате Prometheus (эндпоинт прокси). Опционально.
    store_model_in_db: false

# Наружу НЕ торчим своим LoadBalancer'ом — ходим через общий ingress-nginx (один LB на кластер).
# Внутри кластера сервис остаётся на :4000 (по нему ходит OpenWebUI), наружу — ingress ниже.
service:
  type: ClusterIP
  port: 4000

# Ingress: публикует LiteLLM API на llm.raft.rootcrops.tech (цель k6), TLS — cert-manager.
# ВНИМАНИЕ: API защищён только masterkey. Чтобы не светить его в интернет, можно сузить доступ:
#   nginx.ingress.kubernetes.io/whitelist-source-range: "<твой-CIDR>"
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Инференс на CPU доходит до ~65 с — поднимаем таймауты nginx, иначе 504.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
  hosts:
    - host: llm.raft.rootcrops.tech
      paths:
        - path: /
          pathType: Prefix
  tls:
    # cert-manager создаст и наполнит этот секрет по annotation cluster-issuer выше.
    - secretName: llm-raft-tls
      hosts:
        - llm.raft.rootcrops.tech

# Прокси OOMKilled на старте при 512Mi и 1Gi (gunicorn поднимает несколько воркеров,
# каждый грузит приложение). Даём 2Gi — на ноде ~3.8Gi свободно хватает.
resources:
  requests:
    cpu: 250m
    memory: 1Gi
  limits:
    cpu: "1"
    memory: 2Gi
