# Values для chart otwld/ollama
# helm repo add otwld https://helm.otwld.com/
# helm upgrade --install ollama otwld/ollama -n llm-stand -f helm/ollama-values.yaml
#
# Ollama хостит обе on-prem модели и гоняет инференс на CPU.
# Внутренний сервис: http://ollama:11434 (по нему ходит LiteLLM).

replicaCount: 1

ollama:
  # GPU не используем — инференс на CPU.
  gpu:
    enabled: false
  # Модели тянутся при старте контейнера и кэшируются на PVC.
  # При рестарте пода НЕ перекачиваются (лежат в /root/.ollama на томе).
  models:
    pull:
      - qwen2.5:0.5b
      - llama3.2:1b

# Service остаётся внутренним (ClusterIP) — наружу Ollama не выставляем,
# к нему ходит только LiteLLM по DNS-имени сервиса.
service:
  type: ClusterIP
  port: 11434

# Persistence: модели переживают рестарт пода и остановку/запуск кластера.
persistentVolume:
  enabled: true
  size: 12Gi
  # На TimeWeb default StorageClass нет — указываем сетевой диск CSI явно.
  # Классы: nvme.network-drives.csi.timeweb.cloud / hdd.network-drives.csi.timeweb.cloud.
  # (CSI ставится в панели: Дополнения → CSI-driver.)
  storageClass: "nvme.network-drives.csi.timeweb.cloud"
  accessModes:
    - ReadWriteOnce

# Ноды TimeWeb: 2 vCPU / ~4Gi каждая. Под держим в пределах одной ноды.
# Инференс упирается в CPU — отдаём ему основную долю ядер, mem-limit ниже размера ноды.
# memory request поднят до 2Gi (ближе к реальному потреблению с обеими моделями + KV-кэш):
# при memory pressure на узле kubelet вытесняет поды, превышающие свой request, — заниженный
# request делал Ollama первым кандидатом на eviction под нагрузкой (наблюдали отказ k6).
resources:
  requests:
    cpu: "1"
    memory: 2Gi
  limits:
    cpu: "2"
    memory: 3Gi

# Anti-affinity: на 2-узловом кластере держим Ollama подальше от других «тяжёлых» подов
# (LiteLLM и Grafana), чтобы их суммарные limit'ы не переподписывали один узел 4Gi и не
# провоцировали eviction под нагрузкой. Правила preferred (мягкие) — планировщик не блокирует
# размещение, если развести не удаётся.
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: litellm
      - weight: 50
        podAffinityTerm:
          topologyKey: kubernetes.io/hostname
          namespaces:
            - monitoring
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: grafana

# Модели грузятся не мгновенно — щадящие пробы, чтобы под не убивали при прогреве.
livenessProbe:
  initialDelaySeconds: 60
readinessProbe:
  initialDelaySeconds: 30
