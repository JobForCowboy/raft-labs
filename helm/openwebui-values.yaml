# Values для официального chart open-webui/open-webui
# helm repo add open-webui https://helm.openwebui.com/
# helm upgrade --install openwebui open-webui/open-webui -n llm-stand -f helm/openwebui-values.yaml
#
# OpenWebUI знает только LiteLLM и считает его OpenAI-совместимым API.
# Обе модели появляются в UI, т.к. OpenWebUI запрашивает GET /v1/models у LiteLLM.

# Выключаем встроенный Ollama-сабчарт — ходим строго через LiteLLM, а не напрямую в Ollama.
ollama:
  enabled: false
# Pipelines не нужны.
pipelines:
  enabled: false

# Включаем OpenAI-совместимый канал и направляем его на LiteLLM.
enableOpenaiApi: true
# Внутренний DNS-адрес сервиса LiteLLM в том же namespace.
openaiBaseApiUrls:
  - http://litellm:4000/v1
# openaiApiKeys вынесены в helm/secrets.local.yaml (gitignored), передаётся вторым -f.
# Шаблон — в helm/secrets.example.yaml. Кол-во/порядок ключей = openaiBaseApiUrls выше,
# значение = masterkey LiteLLM.

# Внешний URL — чтобы OpenWebUI строил абсолютные ссылки/редиректы для HTTPS за ingress.
extraEnvVars:
  - name: WEBUI_URL
    value: https://chat.raft.rootcrops.tech

# История чатов переживает рестарт пода.
persistence:
  enabled: true
  size: 2Gi
  # На TimeWeb default StorageClass нет — указываем сетевой диск CSI явно.
  storageClass: "nvme.network-drives.csi.timeweb.cloud"

# Наружу НЕ торчим своим LoadBalancer'ом — ходим через общий ingress-nginx (один LB на кластер).
# Сервис остаётся внутренним, ingress ниже публикует его на chat.raft.rootcrops.tech.
service:
  type: ClusterIP
  port: 80

# Ingress: публикует OpenWebUI на chat.raft.rootcrops.tech через ingress-nginx,
# TLS-сертификат Let's Encrypt выпускает cert-manager (annotation cluster-issuer).
ingress:
  enabled: true
  class: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Инференс на CPU доходит до ~65 с — поднимаем таймауты nginx, иначе 504.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
  host: chat.raft.rootcrops.tech
  tls: true
  # Секрет с TLS-сертификатом — cert-manager создаст и наполнит его сам по annotation выше.
  existingSecret: chat-raft-tls

# 512Mi мало — OpenWebUI OOMKilled (рантайм держит ~0.5Gi уже в простое). Даём 1Gi.
resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi
