# Шаблон секретов стенда. Скопируйте в gitignored-файл и подставьте свои значения:
#
#   cp helm/secrets.example.yaml helm/secrets.local.yaml
#
# helm/secrets.local.yaml НЕ коммитится (см. .gitignore). Один файл на все релизы —
# каждый chart берёт свои ключи, лишние игнорирует. Makefile передаёт его вторым -f
# (после основного values-файла), поэтому эти значения переопределяют дефолты charts.
#
# Тестовые значения ниже намеренно «одноразовые» — для прод-стенда замените на сильные.

# LiteLLM master key — единый Bearer-токен, с которым ходят OpenWebUI и k6.
# Должен совпадать с openaiApiKeys (ниже) и с API_KEY в Makefile/k6.
masterkey: sk-stand-1234

# OpenWebUI → LiteLLM. Кол-во и порядок ключей = openaiBaseApiUrls в openwebui-values.yaml.
# Значение = masterkey выше.
openaiApiKeys:
  - sk-stand-1234

# Grafana admin (kube-prometheus-stack). Логин admin / этот пароль.
grafana:
  adminPassword: admin-stand-1234
