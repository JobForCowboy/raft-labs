# ClusterIssuer для cert-manager — единый издатель Let's Encrypt на весь кластер.
# kubectl apply -f manifests/cluster-issuer.yaml   (делает Makefile в deploy-cert-manager)
#
# ЭТО ЕДИНСТВЕННЫЙ собственный манифест в репозитории. Конвенция стенда — кастомизация
# только через helm/*-values.yaml, но ClusterIssuer это CRD cert-manager, и chart-эквивалента
# у него нет (cert-manager не создаёт издателей сам). Поэтому — отдельный манифест.
#
# Челлендж HTTP-01: cert-manager на время выпуска поднимает временный ingress на пути
# /.well-known/acme-challenge/... и Let's Encrypt проверяет владение доменом по HTTP (:80).
# DNS-провайдер НЕ нужен (в отличие от DNS-01/wildcard). Требование: хост уже должен
# резолвиться в IP LoadBalancer ingress-nginx, а :80 фронтенда LB — быть открыт наружу.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    # ACME-уведомления (истечение сертификата и т.п.). Замените на свою почту.
    email: admin@rootcrops.tech
    # Куда cert-manager сложит приватный ключ аккаунта ACME.
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            class: nginx
